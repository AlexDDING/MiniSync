# MiniSync 默认配置文件
# 命令行参数优先级高于本文件。当前实现以命令行参数为主，本文件用于记录推荐默认值。

mode=local
src_root=./test_dir
dst_root=./backup_dir
server_ip=127.0.0.1
port=9000
thread_count=4
block_size=4096
hash_threshold=10485760
debounce_ms=1500
client_log=./logs/client.log
server_log=./logs/server.log
server_root=./server_backup
